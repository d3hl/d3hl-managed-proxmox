!
! Cisco Catalyst C9300 - Homelab Core Switch Candidate Config
!
! Assumptions:
! - C9300 is the L3 core switch.
! - FortiGate 100F is the gateway/firewall for all VLANs.
! - C9300 management IP is 10.10.10.1/24 on VLAN 10.
! - FortiGate VLAN 10 IP is 10.10.10.2/24.
! - FortiGate trunk interface is TwentyFiveGigE2/1/2.
! - Proxmox node trunks are TenGigabitEthernet2/0/39, TenGigabitEthernet2/0/41, and TenGigabitEthernet2/0/46.
!
! Review interface names before applying.
! Read the current running config first and preserve any existing trunk VLANs.
! This candidate uses "allowed vlan add" so it does not prune production VLANs.
!

configure terminal

!
! VLAN definitions
!
vlan 10
 name PROXMOX_MGMT
vlan 20
 name STORAGE_CEPH
vlan 30
 name VM_SERVICES
vlan 40
 name CONTAINERS_APPS
vlan 50
 name LAB_TEST
vlan 60
 name DMZ
vlan 99
 name INFRA_MGMT

!
! Core switch management SVI
!
interface Vlan10
 description Core switch management
 ip address 10.10.10.1 255.255.255.0
 no shutdown

!
! FortiGate is the default gateway for C9300 management.
!
ip default-gateway 10.10.10.2

!
! Trunk to FortiGate 100F
!
interface TwentyFiveGigE2/1/2
 description Trunk_to_FortiGate_100F
 switchport mode trunk
 switchport trunk allowed vlan add 10,20,30,40,50,60,99
 no shutdown

!
! Trunks to Proxmox nodes
!
interface TenGigabitEthernet2/0/39
 description Trunk_to_Proxmox_nodeA
 switchport mode trunk
 switchport trunk allowed vlan add 10,20,30,40,50,60
 spanning-tree portfast trunk
 no shutdown

interface TenGigabitEthernet2/0/41
 description Trunk_to_Proxmox_nodeB
 switchport mode trunk
 switchport trunk allowed vlan add 10,20,30,40,50,60
 no shutdown

interface TenGigabitEthernet2/0/46
 description Trunk_to_Proxmox_nodeD
 switchport mode trunk
 switchport trunk allowed vlan add 10,20,30,40,50,60
 spanning-tree portfast trunk
 no shutdown

end

!
! Validation:
! show vlan brief
! show interfaces trunk
! show ip interface brief
! show running-config interface vlan10
! ping 10.10.10.2 source vlan10
!
! Save after validation:
! write memory
!
