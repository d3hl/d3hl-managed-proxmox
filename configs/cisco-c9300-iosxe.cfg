!
! Cisco Catalyst C9300 - Homelab Core Switch Candidate Config
!
! Assumptions:
! - C9300 is the L2 core switch.
! - FortiGate 100F is the gateway/firewall for all VLANs.
! - C9300 management IP is 10.99.99.1/24 on VLAN 99.
! - FortiGate VLAN 99 IP is 10.99.99.2/24.
! - FortiGate trunk interface is TenGigabitEthernet1/1/1.
! - Proxmox node trunks are TenGigabitEthernet1/1/2-4.
!
! Review interface names before applying.
! Read the current running config first and preserve any existing trunk VLANs.
! This candidate uses "allowed vlan add" so it does not prune production VLANs.
!

configure terminal

!
! VLAN definitions
!
vlan 10
 name PROXMOX_MGMT
vlan 20
 name STORAGE_CEPH
vlan 30
 name VM_SERVICES
vlan 40
 name CONTAINERS_APPS
vlan 50
 name LAB_TEST
vlan 60
 name DMZ
vlan 99
 name INFRA_MGMT

!
! Core switch management SVI only
!
interface Vlan99
 description Core switch management
 ip address 10.99.99.1 255.255.255.0
 no shutdown

!
! FortiGate is the default gateway for C9300 management.
! C9300 should not route between VLANs in this design.
!
ip default-gateway 10.99.99.2

!
! Trunk to FortiGate 100F
!
interface TenGigabitEthernet1/1/1
 description Trunk_to_FortiGate_100F
 switchport mode trunk
 switchport trunk allowed vlan add 10,20,30,40,50,60,99
 spanning-tree portfast trunk
 no shutdown

!
! Trunks to Proxmox nodes
!
interface range TenGigabitEthernet1/1/2-4
 description Trunk_to_Proxmox_Nodes
 switchport mode trunk
 switchport trunk allowed vlan add 10,20,30,40,50,60
 spanning-tree portfast trunk
 no shutdown

end

!
! Validation:
! show vlan brief
! show interfaces trunk
! show ip interface brief
! show running-config interface vlan99
! ping 10.99.99.2 source vlan99
!
! Save after validation:
! write memory
!
