# FortiGate 100F - VLAN Interface Candidate Config
#
# Current live model:
# - VLAN 10 is the existing `hlvl` interface on parent `x2`.
# - VLAN 99 remains the existing `mgt` hard-switch interface.
# - VLAN 20 remains on the C9300/storage side and is not routed to the firewall.
#
# Candidate scope:
# - Add only missing FortiGate VLAN gateways 30, 40, 50, and 60.
# - Review and update the C9300-to-FortiGate trunk before applying this file.
# - Do not delete or rename `hlvl`, `mgt`, VLAN 11 `k8s`, or VLAN 100 `Wifi`.

config system interface
    edit "VLAN30_VM_SERVICES"
        set interface "x2"
        set vlanid 30
        set ip 10.10.30.2 255.255.255.0
        set allowaccess ping
        set alias "VM services"
        set role lan
    next
    edit "VLAN40_CONTAINERS_APPS"
        set interface "x2"
        set vlanid 40
        set ip 10.10.40.2 255.255.255.0
        set allowaccess ping
        set alias "Containers / apps"
        set role lan
    next
    edit "VLAN50_LAB_TEST"
        set interface "x2"
        set vlanid 50
        set ip 10.10.50.2 255.255.255.0
        set allowaccess ping
        set alias "Lab / test"
        set role lan
    next
    edit "VLAN60_DMZ"
        set interface "x2"
        set vlanid 60
        set ip 10.10.60.2 255.255.255.0
        set allowaccess ping
        set alias "DMZ / public-facing"
        set role dmz
    next
end

# Validation examples:
# show system interface
# get system interface
# execute ping-options source 10.10.10.2
# execute ping 10.10.10.1
