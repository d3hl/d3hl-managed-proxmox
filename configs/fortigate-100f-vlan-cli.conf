# FortiGate 100F - VLAN Interface Candidate Config
#
# Assumptions:
# - FortiGate is the gateway/firewall for all VLANs.
# - FortiGate uses .2 on every VLAN.
# - Parent trunk interface must be discovered and confirmed before applying.
#
# IMPORTANT:
# Replace "__CONFIRM_PARENT_INTERFACE__" with the real parent interface or aggregate before applying.
# Examples: "port1", "agg-core", "internal", "lan", etc.
# Do not paste this file while the placeholder is still present.

config system interface
    edit "VLAN10_PROXMOX_MGMT"
        set interface "__CONFIRM_PARENT_INTERFACE__"
        set vlanid 10
        set ip 10.10.10.2 255.255.255.0
        set allowaccess ping https ssh
        set alias "Proxmox management"
        set role lan
    next
    edit "VLAN20_STORAGE_CEPH"
        set interface "__CONFIRM_PARENT_INTERFACE__"
        set vlanid 20
        set ip 10.20.20.2 255.255.255.0
        set allowaccess ping
        set alias "Storage / Ceph"
        set role lan
    next
    edit "VLAN30_VM_SERVICES"
        set interface "__CONFIRM_PARENT_INTERFACE__"
        set vlanid 30
        set ip 10.10.30.2 255.255.255.0
        set allowaccess ping
        set alias "VM services"
        set role lan
    next
    edit "VLAN40_CONTAINERS_APPS"
        set interface "__CONFIRM_PARENT_INTERFACE__"
        set vlanid 40
        set ip 10.10.40.2 255.255.255.0
        set allowaccess ping
        set alias "Containers / apps"
        set role lan
    next
    edit "VLAN50_LAB_TEST"
        set interface "__CONFIRM_PARENT_INTERFACE__"
        set vlanid 50
        set ip 10.10.50.2 255.255.255.0
        set allowaccess ping
        set alias "Lab / test"
        set role lan
    next
    edit "VLAN60_DMZ"
        set interface "__CONFIRM_PARENT_INTERFACE__"
        set vlanid 60
        set ip 10.10.60.2 255.255.255.0
        set allowaccess ping
        set alias "DMZ / public-facing"
        set role dmz
    next
    edit "VLAN99_INFRA_MGMT"
        set interface "__CONFIRM_PARENT_INTERFACE__"
        set vlanid 99
        set ip 10.99.99.2 255.255.255.0
        set allowaccess ping https ssh
        set alias "Infrastructure management"
        set role lan
    next
end

# Validation examples:
# show system interface
# get system interface
# execute ping-options source 10.99.99.2
# execute ping 10.99.99.1
