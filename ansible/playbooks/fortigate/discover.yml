---
- name: Discover FortiGate interfaces
  hosts: fortigates
  gather_facts: false
  collections:
    - fortinet.fortios

  pre_tasks:
    - name: Require FortiGate API token from environment
      ansible.builtin.assert:
        that:
          - fortigate_access_token | length > 0
        fail_msg: "Set FORTIOS_ACCESS_TOKEN via op run before discovery."

  tasks:
    - name: Ensure artifacts directory exists
      ansible.builtin.file:
        path: "{{ playbook_dir }}/../../artifacts"
        state: directory
        mode: "0750"
      delegate_to: localhost

    - name: Read current FortiGate interfaces
      fortinet.fortios.fortios_configuration_fact:
        vdom: "{{ fortigate_vdom }}"
        access_token: "{{ fortigate_access_token }}"
        selector: system_interface
      register: fortigate_interfaces

    - name: Show interface names, parent interfaces, VLAN IDs, and IPs
      ansible.builtin.debug:
        msg: >-
          name={{ item.name | default('') }}
          parent={{ item.interface | default('') }}
          vlanid={{ item.vlanid | default('') }}
          ip={{ item.ip | default('') }}
      loop: "{{ fortigate_interfaces.meta.results | default([]) }}"

    - name: Save discovery output locally for review
      ansible.builtin.copy:
        dest: "{{ playbook_dir }}/../../artifacts/fortigate-system-interface-discovery.json"
        mode: "0600"
        content: "{{ fortigate_interfaces.meta.results | default([]) | to_nice_json }}"
      delegate_to: localhost
